<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JCN Estoque — Administrador</title>
<link href="https://fonts.googleapis.com/css2?family=Trebuchet+MS&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Trebuchet MS',Trebuchet,sans-serif;background:#f5f7f5;color:#1f2937}
.topbar{background:#538557;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;border-bottom:2px solid #2D5C31;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.topbar-logo{height:38px;object-fit:contain}
.topbar-right{display:flex;align-items:center;gap:14px}
.topbar-role{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);font-size:11px;font-weight:700;border-radius:6px;padding:3px 10px;text-transform:uppercase}
.topbar-user{color:#fff;font-size:13px;font-weight:600}
.sync-indicator{font-size:11px;display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:10px;background:rgba(255,255,255,.15);color:#fff;font-weight:600}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#B6D559;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.page-wrap{padding:24px;max-width:1100px;margin:0 auto}
.page-title{font-size:22px;font-weight:700;color:#2D5C31;margin-bottom:4px}
.page-sub{font-size:14px;color:#6b7280;margin-bottom:20px}
.filter-bar{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;box-shadow:0 1px 4px rgba(83,133,87,.08)}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-label{font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px}
.filter-input{border:1.5px solid #d1d5db;border-radius:7px;padding:7px 12px;font-family:'Trebuchet MS',Trebuchet,sans-serif;font-size:13px;color:#111;outline:none;transition:border .15s;background:#fff}
.filter-input:focus{border-color:#538557}
.filter-actions{margin-left:auto;display:flex;gap:8px;align-items:flex-end}
.btn-export{background:#538557;color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Trebuchet MS',Trebuchet,sans-serif;display:flex;align-items:center;gap:6px}
.btn-export:hover{background:#2D5C31}
.btn-clear{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb;border-radius:7px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Trebuchet MS',Trebuchet,sans-serif}
.btn-clear:hover{background:#e5e7eb}
.tabs{display:flex;gap:2px;background:#f3f4f6;border-radius:8px;padding:3px;width:fit-content;margin-bottom:16px}
.tab-btn{padding:8px 20px;border-radius:6px;border:none;background:transparent;font-size:13px;font-weight:600;color:#6b7280;cursor:pointer;font-family:'Trebuchet MS',Trebuchet,sans-serif;transition:.15s;display:flex;align-items:center;gap:6px}
.tab-btn.active{background:#fff;color:#538557;box-shadow:0 1px 3px rgba(0,0,0,.1);font-weight:700}
.badge{background:#dc2626;color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 7px;display:inline-block}
.badge-done{background:#538557}
.card{background:#fff;border-radius:10px;border:1px solid #e5e7eb;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 4px rgba(83,133,87,.08)}
.section-label{padding:12px 24px 12px 20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#2D5C31;background:#f0f5f0;border-bottom:1px solid #d4e4d4;border-left:4px solid #538557;display:flex;align-items:center;gap:8px}
.notif-empty{padding:60px 20px;text-align:center;color:#9ca3af;font-size:14px}
.notif-empty .ei{font-size:42px;margin-bottom:12px}
.notif-card{border-bottom:1px solid #f3f4f6;padding:18px 24px;transition:background .15s}
.notif-card:last-child{border-bottom:none}
.notif-card.unread{border-left:4px solid #538557;padding-left:20px}
.notif-card:hover{background:#fafafa}
.notif-meta{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.notif-who{font-size:14px;font-weight:700;color:#2D5C31}
.notif-when{font-size:12px;color:#9ca3af}
.notif-desc{font-size:15px;color:#111;font-weight:700;margin-bottom:4px}
.notif-fields{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 16px;margin-top:10px;background:#f9fafb;border-radius:8px;padding:10px 14px;border:1px solid #eef0f2}
.notif-field-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#9ca3af;margin-bottom:2px}
.notif-field-val{font-size:13px;color:#374151;font-weight:500}
.notif-dup-warn{font-size:12px;color:#c0392b;font-weight:600;margin-top:8px;display:flex;align-items:center;gap:5px;background:#fff5f5;padding:6px 10px;border-radius:6px;border:1px solid #fecaca}
.notif-obs{margin-top:8px;padding:8px 12px;background:#f8faf8;border-radius:6px;border-left:3px solid #538557;font-size:13px;color:#374151}
.notif-obs strong{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:#538557}
.notif-status{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;text-transform:uppercase;margin-top:10px;letter-spacing:.3px}
.status-pending{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.status-approved{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.status-rejected{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.motivo-box{margin-top:6px;font-size:12px;color:#7d4a00;background:#fff8f0;border:1px solid #f5cba7;border-radius:5px;padding:6px 10px}
.notif-actions{display:flex;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid #f3f4f6;flex-wrap:wrap;align-items:center}
.btn-sm{padding:8px 18px;border-radius:7px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:'Trebuchet MS',Trebuchet,sans-serif;transition:.15s;display:flex;align-items:center;gap:5px}
.btn-approve{background:#538557;color:#fff}.btn-approve:hover{background:#2D5C31}
.btn-reject{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}.btn-reject:hover{background:#fecaca}
.btn-ghost{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb;margin-left:auto}.btn-ghost:hover{background:#e5e7eb}
.toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:600;opacity:0;transform:translateY(20px);transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.15);display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:#538557;color:#fff}
.toast.warn{background:#7f1d1d;color:#fff}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyBluPiH5I5jUGdiql4xDmnqTo8d4Xa5lhM",
  authDomain: "cadastro-de-item.firebaseapp.com",
  projectId: "cadastro-de-item",
  storageBucket: "cadastro-de-item.firebasestorage.app",
  messagingSenderId: "264983242800",
  appId: "1:264983242800:web:039b224cc91389441ea5f5"
});
const db  = getFirestore(app);

let allDocs = [];
let currentTab = 'pending';

// ── REAL-TIME LISTENER ────────────────────────────────────────────────────────
const q = query(collection(db,'solicitacoes'), orderBy('createdAt','desc'));
onSnapshot(q, snap => {
  allDocs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderAll();
});

// ── TABS ──────────────────────────────────────────────────────────────────────
window.switchTab = function(tab) {
  currentTab = tab;
  document.getElementById('panelPending').style.display = tab==='pending'?'block':'none';
  document.getElementById('panelDone').style.display    = tab==='done'?'block':'none';
  document.getElementById('tabPending').classList.toggle('active', tab==='pending');
  document.getElementById('tabDone').classList.toggle('active', tab==='done');
};

// ── FILTERS ───────────────────────────────────────────────────────────────────
function applyFilters(list) {
  const search = (document.getElementById('filterSearch')?.value||'').trim().toLowerCase();
  const grupo  = (document.getElementById('filterGrupo')?.value||'').trim();
  const sol    = (document.getElementById('filterSolicitante')?.value||'').trim().toLowerCase();
  return list.filter(s => {
    const ms = !search || (s.solicitante||'').toLowerCase().includes(search) || (s.descricao||'').toLowerCase().includes(search) || (s.codigoFab||'').toLowerCase().includes(search);
    const mg = !grupo  || (s.grupo||'')===grupo;
    const mv = !sol    || (s.solicitante||'').toLowerCase().includes(sol);
    return ms && mg && mv;
  });
}
window.limparFiltros = function() {
  ['filterSearch','filterSolicitante'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('filterGrupo').value='';
  renderAll();
};

// ── RENDER ────────────────────────────────────────────────────────────────────
window.renderAll = function() {
  const pending = allDocs.filter(s=>s.status==='pending');
  const done    = allDocs.filter(s=>s.status!=='pending');

  document.getElementById('badgePending').textContent = pending.length;
  document.getElementById('badgePending').style.display = pending.length>0?'inline-block':'none';
  document.getElementById('badgeDone').textContent = done.length;
  document.getElementById('badgeDone').style.display = done.length>0?'inline-block':'none';

  const fp = applyFilters(pending);
  const lp = document.getElementById('listPending');
  lp.innerHTML='';
  if(fp.length===0){lp.innerHTML=`<div class="notif-empty"><div class="ei">📭</div><p>${pending.length>0?'Nenhuma corresponde ao filtro.':'Nenhuma solicitação pendente.'}</p></div>`;}
  else fp.forEach(s=>lp.appendChild(makeCard(s,true)));

  const fd = applyFilters(done);
  const ld = document.getElementById('listDone');
  ld.innerHTML='';
  if(fd.length===0){ld.innerHTML='<div class="notif-empty"><div class="ei">✅</div><p>Nenhuma atendida ainda.</p></div>';}
  else fd.forEach(s=>ld.appendChild(makeCard(s,false)));
};

function fmtDate(ts){
  if(!ts?.toDate)return '—';
  const d=ts.toDate();
  return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function makeCard(s, isPending){
  const statusMap={pending:'status-pending',approved:'status-approved',rejected:'status-rejected'};
  const labelMap={pending:'⏳ Pendente',approved:'✅ Cadastrado',rejected:'❌ Rejeitado'};
  const fields=[
    ['Catálogo',s.codigoFab||'—'],['Marca',s.marca||'—'],['Local',s.local||'—'],
    ['Unidade',s.unidade||'—'],['Tipo',s.tipo||'—'],['Grupo',s.grupo||'—'],
    ['Controla Estoque',s.estoque||'—'],['Data Solicitada',s.data?new Date(s.data+'T12:00:00').toLocaleDateString('pt-BR'):'—'],
  ];
  const card=document.createElement('div');
  card.className='notif-card'+(s.adminUnread&&isPending?' unread':'');
  card.style.animation='fadeIn .2s ease';
  card.innerHTML=`
    <div class="notif-meta">
      <span class="notif-who">${s.solicitante||'—'}</span>
      <span class="notif-when">${fmtDate(s.createdAt)}</span>
    </div>
    <div class="notif-desc">${s.descricao||''}</div>
    <div class="notif-fields">
      ${fields.map(([l,v])=>`<div><div class="notif-field-label">${l}</div><div class="notif-field-val">${v}</div></div>`).join('')}
    </div>
    ${s.obs?`<div class="notif-obs"><strong>Observação do solicitante</strong><br>${s.obs}</div>`:''}
    ${s.hasDuplicate?'<div class="notif-dup-warn">⚠ Item similar foi detectado na base durante a solicitação</div>':''}
    <span class="notif-status ${statusMap[s.status]||'status-pending'}">${labelMap[s.status]||'⏳ Pendente'}</span>
    ${s.status==='rejected'&&s.motivo?`<div class="motivo-box">💬 Motivo: ${s.motivo}</div>`:''}
    ${isPending?`
    <div class="notif-actions">
      <button class="btn-sm btn-approve" onclick="updateStatus('${s.id}','approved','')">✓ Cadastrar item</button>
      <button class="btn-sm btn-reject"  onclick="openReject('${s.id}')">✗ Rejeitar</button>
      <button class="btn-sm btn-ghost"   onclick="removeItem('${s.id}')">Remover</button>
    </div>`:`
    <div class="notif-actions">
      <button class="btn-sm btn-ghost" onclick="removeItem('${s.id}')">Remover</button>
    </div>`}`;
  return card;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
window.openReject = function(id) {
  const motivo = prompt('Informe o motivo da rejeição (opcional):') ?? '';
  updateStatus(id, 'rejected', motivo);
};

window.updateStatus = async function(id, status, motivo) {
  try {
    await updateDoc(doc(db,'solicitacoes',id),{
      status, motivo: motivo||'', adminUnread:false, userSeen:false,
      updatedAt: serverTimestamp()
    });
    showToast(status==='approved'?'✅ Item cadastrado com sucesso!':'✗ Solicitação rejeitada.', status==='approved'?'success':'warn');
  } catch(e){ showToast('Erro: '+e.message,'warn'); }
};

window.removeItem = async function(id) {
  if(!confirm('Remover esta solicitação permanentemente?'))return;
  try{ await deleteDoc(doc(db,'solicitacoes',id)); showToast('Removido.','success'); }
  catch(e){ showToast('Erro: '+e.message,'warn'); }
};

// ── EXPORT ────────────────────────────────────────────────────────────────────
window.exportarCSV = function() {
  const pending = applyFilters(allDocs.filter(s=>s.status==='pending'));
  if(pending.length===0){alert('Nenhuma solicitação pendente para exportar.');return;}
  const header=['Solicitante','Data','Descrição','Cód. Fabricante','Marca','Local','Unidade','Tipo','Grupo','Controla Estoque','Observações','Tem Similar'];
  const rows=pending.map(s=>[
    s.solicitante||'',s.data||'',s.descricao||'',s.codigoFab||'',s.marca||'',
    s.local||'',s.unidade||'',s.tipo||'',s.grupo||'',s.estoque||'',
    s.obs||'',s.hasDuplicate?'Sim':'Não'
  ]);
  const csv=[header,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='solicitacoes_pendentes_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  showToast('✅ Exportado com sucesso!','success');
};

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg,type){
  const t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+type;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3200);
}
</script>
